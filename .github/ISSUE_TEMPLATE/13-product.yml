body:
  - type: markdown
    attributes:
      value: Let AI build, be orchestrator, ship instantly. 🤖🪄🚀

  - type: textarea
    attributes:
      label: Description
      value: |
        ### Purpose
        What product lifecycle outcome should this issue drive?

        ### Deliverable
        What should be shipped, produced, or completed?

        ### Acceptance Criteria
        - [ ] Define what "done" means
        - [ ] Confirm the expected outcome is met

        ### Notes
        Add any short context, constraints, or links that matter.
