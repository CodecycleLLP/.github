      value: |
        ### Access Request
        <!-- Use this issue to request or manage credentials. Identify the user, system, and role that need access. -->

        1. User:
        2. System:
        3. Role:

        ### Duration
        <!-- Mark temporary access with a clear end date. -->

        - [ ] Permanent
